[package]
name = "vnstat-rs"
version = "0.1.0"
edition = "2024"
authors = ["Seungjin Kim"]
license = "MIT OR Apache-2.0"

[dependencies]
libsql = { version = "0.9.30", features = ["core", "replication"] }
tokio = { version = "1.36", features = ["full"] }
anyhow = "1.0"
clap = { version = "4.5", features = ["derive", "env"] }
futures = "0.3"
hostname = "0.4"
chrono = "0.4"

[[bin]]
name = "vnstat-rs"
path = "src/bin/vnstat.rs"

[[bin]]
name = "vnstatd-rs"
path = "src/bin/vnstatd.rs"
